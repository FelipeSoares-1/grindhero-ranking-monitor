name: Coleta Ranking GrindHero

on:
  # AGENDAMENTO REDUNDANTE (dupla fonte para nao perder coletas):
  #   1) Cron nativo do GitHub Actions (abaixo) — agendador primario confiavel.
  #   2) Claude Routines (Anthropic cloud) — backup que tambem dispara via workflow_dispatch.
  # A trava "pular se ja coletou nas ultimas 2h" evita coleta duplicada quando ambos disparam.
  # Horarios alvo BRT: 09h, 14h, 20h, 23h55  ->  UTC: 12h, 17h, 23h, 02h55.
  # Rotinas: trig_01QUPSNc9vr4rfhpZLWEAJwF (09h) | trig_01QyMBuyXh7i7gyXnrhiFA7j (14h)
  #          trig_01E1bXAXFMfvJTYDJsCa1auJ (20h) | trig_0121HJ85YNjfF6Z8SgpTkX8S (23h55)
  schedule:
    - cron: '0 12 * * *'    # 09h BRT
    - cron: '0 17 * * *'    # 14h BRT
    - cron: '0 23 * * *'    # 20h BRT
    - cron: '55 2 * * *'    # 23h55 BRT (fechamento canonico)
  workflow_dispatch:        # permite rodar manualmente pela aba Actions
    inputs:
      force:
        description: 'Forcar coleta mesmo se ja teve uma recente'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

# Permitir que o workflow faca commit+push de volta no repo
permissions:
  contents: write
  pages: write
  id-token: write

# Garantir que apenas 1 coleta roda por vez (evita conflito de commits)
concurrency:
  group: coleta-ranking
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: America/Sao_Paulo
    outputs:
      skipped: ${{ steps.skip_check.outputs.skip }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Mostrar timezone
        run: |
          date
          echo "TZ=$TZ"
          python -c "from datetime import datetime; print('Hora atual no script:', datetime.now())"

      - name: Verificar se ja teve coleta recente
        id: skip_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "Forcado pelo usuario - rodando."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f ranking.db ]; then
            echo "Sem banco - primeira coleta."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pega timestamp da ultima coleta e compara com agora (BRT)
          MIN_AGO=$(python -c "
          import sqlite3
          from datetime import datetime
          c = sqlite3.connect('ranking.db')
          ts = c.execute('SELECT MAX(collected_at) FROM snapshots').fetchone()[0]
          c.close()
          if ts is None: print(9999); exit()
          last = datetime.strptime(ts,'%Y-%m-%d %H:%M:%S')
          diff_min = (datetime.now() - last).total_seconds() / 60
          print(int(diff_min))
          ")
          echo "Ultima coleta foi ha $MIN_AGO minutos."
          if [ "$MIN_AGO" -lt 45 ]; then
            echo "Pulando: coleta recente (<45min). Deduplica disparos proximos."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Coletar ranking
        if: steps.skip_check.outputs.skip != 'true'
        run: python coletor_ranking.py

      - name: Exportar dados para o React app
        if: steps.skip_check.outputs.skip != 'true'
        run: python exportar_dados.py

      - name: Setup Node.js
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard-app/package-lock.json

      - name: Instalar dependencias Node
        if: steps.skip_check.outputs.skip != 'true'
        run: npm ci
        working-directory: dashboard-app

      - name: Build do React app
        if: steps.skip_check.outputs.skip != 'true'
        run: npm run build
        working-directory: dashboard-app

      - name: Commit e push das atualizacoes
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ranking.db ranking_latest.json dashboard-app/public/data.json logs/coleta.log || true
          if git diff --staged --quiet; then
            echo "Nada para commitar."
            exit 0
          fi
          git commit -m "coleta automatica: $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M BRT')"
          # Push com retry (caso outro job tenha pushado entre o commit e push)
          for i in 1 2 3; do
            if git push; then
              echo "Push OK na tentativa $i"
              break
            fi
            echo "Push falhou tentativa $i, sincronizando..."
            git pull --rebase origin master || true
            sleep 3
          done

      - name: Upload do React app como artefato Pages
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard-app/dist
          name: github-pages

  publicar-pages:
    needs: coletar
    if: needs.coletar.result == 'success' && needs.coletar.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

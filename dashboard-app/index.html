  <style>
    #rs-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: #0d0d0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #rs-gate.hidden { display: none; }
    .rs-gate-logo { width: 90px; filter: drop-shadow(0 0 14px rgba(196,18,18,0.7)); }
    .rs-gate-title {
      font-family: Anton, sans-serif; font-size: 1.4rem;
      color: #c41212; letter-spacing: 3px; text-transform: uppercase;
    }
    .rs-gate-form { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .rs-gate-input {
      background: #1a1a1a; border: 1px solid #333; color: #fff;
      padding: 10px 18px; font-size: 1rem; text-align: center;
      outline: none; letter-spacing: 4px; width: 220px;
    }
    .rs-gate-input:focus { border-color: #c41212; }
    .rs-gate-btn {
      background: linear-gradient(135deg,#8c0000,#c41212); border: none; color: #fff;
      font-family: Anton, sans-serif; letter-spacing: 2px; text-transform: uppercase;
      padding: 10px 32px; cursor: pointer; font-size: 0.9rem; width: 220px;
    }
    .rs-gate-btn:hover { box-shadow: 0 0 14px rgba(196,18,18,0.5); }
    .rs-gate-error { color: #c41212; font-size: 0.8rem; min-height: 18px; }
  </style>
  <script>
    (function(){
      const HASH = "fe5c14e52b5cef6021f7757f130a5dd2f76883f9654dd5e54e53b0320f3818b7";
      const KEY  = "rs_auth_v1";
      if(sessionStorage.getItem(KEY) === HASH){
        document.addEventListener('DOMContentLoaded',function(){
          var g=document.getElementById('rs-gate'); if(g) g.classList.add('hidden');
        });
      }
    })();
  </script>
  </head>
  <body>

  <!-- PASSWORD GATE -->
  <div id="rs-gate">
    <img class="rs-gate-logo" src="/red-skull-logo.webp" alt="RED SKULL"
         onerror="this.style.display='none'">
    <div class="rs-gate-title">Red Skull Monitor</div>
    <form class="rs-gate-form" onsubmit="return rsCheckPwd(event)">
      <input class="rs-gate-input" id="rs-pwd" type="password"
             placeholder="••••••••••••" autocomplete="off" autofocus>
      <div class="rs-gate-error" id="rs-err"></div>
      <button class="rs-gate-btn" type="submit">Entrar</button>
    </form>
  </div>

  <script>
    async function rsCheckPwd(e){
      e.preventDefault();
      const pwd = document.getElementById('rs-pwd').value;
      const HASH = "fe5c14e52b5cef6021f7757f130a5dd2f76883f9654dd5e54e53b0320f3818b7";
      const enc = new TextEncoder().encode(pwd);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      if(hex === HASH){
        sessionStorage.setItem('rs_auth_v1', HASH);
        document.getElementById('rs-gate').classList.add('hidden');
        document.getElementById('rs-err').textContent = '';
      } else {
        document.getElementById('rs-err').textContent = 'Senha incorreta.';
        document.getElementById('rs-pwd').value = '';
        document.getElementById('rs-pwd').focus();
      }
      return false;
    }
  </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
